spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

server:
  port: 8080

jwt:
  secret: "ThisIsAVeryLongSecretKeyForJWTSigningThatIsAtLeast256BitsLongForSecurity"
  expiration: 86400000

ml:
  base-url: http://localhost:8001

reports:
  storage-path: /tmp/reports
